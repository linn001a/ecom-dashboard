<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经营数据看板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0f172a; color:#e2e8f0; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.container { max-width:600px; width:100%; padding:40px 20px; text-align:center; }
h1 { font-size:28px; margin-bottom:8px; }
.sub { color:#94a3b8; margin-bottom:32px; }
.list { text-align:left; }
.list a { display:block; padding:16px 20px; margin-bottom:8px; background:#1e293b; border:1px solid #334155; border-radius:10px; color:#3b82f6; text-decoration:none; font-size:16px; transition:all 0.2s; }
.list a:hover { background:#334155; border-color:#3b82f6; }
</style>
</head>
<body>
<div class="container">
  <h1>📊 经营数据看板</h1>
  <p class="sub">私域电商管理团队</p>
  <div class="list" id="links"></div>
</div>
<script>
fetch('./')
  .then(r => r.text())
  .then(html => {
    const matches = html.match(/dashboard_[\d-]+\.html/g);
    const container = document.getElementById('links');
    if (matches) {
      [...new Set(matches)].sort().reverse().forEach(f => {
        const dateStr = f.replace('dashboard_','').replace('.html','');
        const a = document.createElement('a');
        a.href = f;
        a.textContent = `📅 ${dateStr} 经营看板`;
        container.appendChild(a);
      });
    } else {
      container.innerHTML = '<p style="color:#94a3b8">暂无看板报告</p>';
    }
  });
</script>
</body>
</html>
